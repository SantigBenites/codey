# Production config
# Owner: platform team
# Last reviewed: 2026-04-12

database:
  host: db-prod.internal
  port: 5432
  pool_size: 20
  ssl: true
  credentials:
    user: app_rw
    secret_arn: arn:aws:secretsmanager:eu-west-1:123:secret/db-prod

cache:
  backend: redis
  ttl_seconds: 300
  max_entries: 10000

logging:
  level: INFO
  format: json
  destinations:
    - stdout
    - cloudwatch

feature_flags:
  new_checkout: true
  legacy_search: false
  experimental_recs: false